name: Run tests

on:
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "^1.26"
      - name: Perform the test
        run: make test
