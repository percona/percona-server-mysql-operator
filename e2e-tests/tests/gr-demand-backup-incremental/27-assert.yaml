apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 300
resourceRefs:
- apiVersion: ps.percona.com/v1
  kind: PerconaServerMySQLBackup
  name: base-backup-compressed
  ref: bcp
assertAll:
- celExpr: bcp.status.state == "Succeeded"
  message: "Compressed base backup should be succeeded"

- celExpr: bcp.status.type == "full"
  message: "Compressed base backup should be a full backup"

- celExpr: bcp.status.compressed == true
  message: "Compressed base backup should have compressed=true in status"
