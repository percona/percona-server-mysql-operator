apiVersion: ps.percona.com/v1
kind: PerconaServerMySQLRestore
metadata:
  name: restore-of-demand-backup
spec:
  clusterName: demand-backup
  backupName: demand-backup
  containerOptions:
    env:
    - name: CUSTOM_ENV
      value: "test-2"
    args:
      xtrabackup:
      - "--strict"
      xbstream:
      - "--verbose"
