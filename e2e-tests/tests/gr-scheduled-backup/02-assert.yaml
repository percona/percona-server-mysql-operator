apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 500
commands:
  - timeout: 500
    script: |-
      set -o errexit

      source ../../functions

      cluster_name=$(get_cluster_name)
      kubectl wait --for=condition=complete job/sysbench-data -n "${NAMESPACE}" --timeout=400s
      sleep 10
      wait_cluster_consistency_gr "${cluster_name}" 3 3

      data=$(run_mysql_query_file "conf/data-query.sql" "-h $(get_router_service "${cluster_name}")")
      kubectl create configmap -n "${NAMESPACE}" 02-gr-scheduled-backup-data --from-literal=data="${data}" --dry-run=client -o yaml \
        | kubectl apply -n "${NAMESPACE}" -f -
---
apiVersion: ps.percona.com/v1
kind: PerconaServerMySQL
metadata:
  name: gr-scheduled-backup
  finalizers:
    - percona.com/delete-mysql-pods-in-order
status:
  mysql:
    ready: 3
    size: 3
    state: ready
  router:
    ready: 3
    size: 3
    state: ready
  state: ready
---
apiVersion: batch/v1
kind: Job
metadata:
  name: sysbench-data
status:
  succeeded: 1
---
