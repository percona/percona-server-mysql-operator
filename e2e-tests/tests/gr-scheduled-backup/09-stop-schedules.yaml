apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - timeout: 30
    script: |
      kubectl get ps gr-scheduled-backup -n ${NAMESPACE} -o json \
        | yq '
          (
            .spec.backup.storages
            | keys
            | map(select(. != "minio"))
            | .[0] // ""
          ) as $storage
          | .spec.backup.schedule = [{
              "keep": 3,
              "name": "storage-1",
              "schedule": "",
              "storageName": $storage
            }]
        ' \
        | kubectl apply -f -
