apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |
      set -o errexit
      set -o xtrace

      source ../../functions

      # Gets first storage defined and run backup
      first_storage_name=$(kubectl get ps gr-demand-backup-cloud -n ${NAMESPACE} -o yaml | yq '(.spec.backup.storages // {}) | keys | .[0]')
      run_backup gr-demand-backup-cloud-1 $first_storage_name "$(get_cluster_name)"