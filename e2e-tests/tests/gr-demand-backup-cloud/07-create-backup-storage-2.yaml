apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |
      set -o errexit
      set -o xtrace

      source ../../functions

      # Gets second storage defined and run backup
      second_storage_name=$(kubectl get ps gr-demand-backup-cloud -n ${NAMESPACE} -o yaml | yq '(.spec.backup.storages // {}) | keys | .[1]')
      run_backup gr-demand-backup-cloud-2 $second_storage_name "$(get_cluster_name)"
