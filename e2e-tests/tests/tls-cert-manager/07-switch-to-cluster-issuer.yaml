apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 120
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      cluster_issuer_name="tls-cert-manager-cluster-issuer-${NAMESPACE}"
      operator_sa="percona-server-mysql-operator"

      if [[ "${TLS_CERT_MANAGER_USE_CLUSTERISSUER_RBAC:-true}" == "true" ]]; then
          kubectl create clusterrole "${cluster_issuer_name}-reader" \
              --verb=get,list,watch \
              --resource=clusterissuers.cert-manager.io \
              --dry-run=client -o yaml | kubectl apply -f -

          kubectl create clusterrolebinding "${cluster_issuer_name}-reader-${NAMESPACE}" \
              --clusterrole="${cluster_issuer_name}-reader" \
              --serviceaccount="${OPERATOR_NS:-$NAMESPACE}:${operator_sa}" \
              --dry-run=client -o yaml | kubectl apply -f -
      fi

      printf '%s\n' \
          'apiVersion: cert-manager.io/v1' \
          'kind: ClusterIssuer' \
          'metadata:' \
          "  name: ${cluster_issuer_name}" \
          'spec:' \
          '  selfSigned: {}' \
          | kubectl apply -f -

      kubectl -n "${NAMESPACE}" patch ps tls-cert-manager \
          --type json \
          -p '[
              {
                "op": "add",
                "path": "/spec/tls/issuerConf",
                "value": {
                  "group": "cert-manager.io",
                  "kind": "ClusterIssuer",
                  "name": "'"${cluster_issuer_name}"'"
                }
              }
            ]'
    timeout: 120
