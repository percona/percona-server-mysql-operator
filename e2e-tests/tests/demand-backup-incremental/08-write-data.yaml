apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      run_mysql \
          "INSERT myDB.myTable (id) VALUES (100504)" \
          "-h $(get_haproxy_svc $(get_cluster_name))"
          
      sleep 10
      cluster_name=$(get_cluster_name)
      for pod in $(kubectl -n "${NAMESPACE}" get pods -l "app.kubernetes.io/component=database,app.kubernetes.io/instance=${cluster_name}" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}'); do
          run_mysql "SET GLOBAL innodb_max_dirty_pages_pct = 0" "-h ${pod}.${cluster_name}-mysql"
      done