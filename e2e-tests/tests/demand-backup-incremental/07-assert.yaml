apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 300
resourceRefs:
- apiVersion: ps.percona.com/v1
  kind: PerconaServerMySQLBackup
  name: incr-1
  ref: incr1
assertAll:
- celExpr: incr1.status.state == "Succeeded"
  message: "Incremental backup should be succeeded"

- celExpr: incr1.metadata.annotations["percona.com/base-backup-name"] != ""
  message: "Incremental backup should have a base backup annotation"