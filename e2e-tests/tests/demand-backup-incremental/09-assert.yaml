apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 300
resourceRefs:
- apiVersion: ps.percona.com/v1
  kind: PerconaServerMySQLBackup
  name: base-backup
  ref: base
- apiVersion: ps.percona.com/v1
  kind: PerconaServerMySQLBackup
  name: incr-2
  ref: incr2
assertAll:
- celExpr: incr2.status.state == "Succeeded"
  message: "Incremental backup should be succeeded"

- celExpr: incr2.status.type == "incremental"
  message: "Incremental backup should have a type of incremental"

- celExpr: base.status.destination.contains(incr2.metadata.annotations["percona.com/base-backup-name"])
  message: "Base backup annotation should reference the correct base backup"

commands:
  - script: |-
      set -o errexit
      set -o xtrace

      accessKey="$(kubectl -n "${NAMESPACE}" get secret minio-secret -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d)"
      secretKey="$(kubectl -n "${NAMESPACE}" get secret minio-secret -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' | base64 -d)"

      destination=$(kubectl get ps-backup incr-2 -n "${NAMESPACE}" -o jsonpath='{.status.destination}')

      listing=$(kubectl run -n "${NAMESPACE}" -i --rm aws-cli --image=perconalab/awscli --restart=Never -- \
        /usr/bin/env AWS_ACCESS_KEY_ID="$accessKey" AWS_SECRET_ACCESS_KEY="$secretKey" AWS_DEFAULT_REGION=us-east-1 \
        /usr/bin/aws --endpoint-url "http://minio-service:9000" s3 ls "$destination/" --recursive 2>/dev/null)

      count=$(echo "$listing" | wc -l)
      if [ "$count" -le 0 ]; then
        echo "No backup files found in storage at $destination"
        exit 1
      fi

      echo "Found $count files in $destination"

      delta_count=$(echo "$listing" | grep -c '\.delta\.' || true)
      if [ "$delta_count" -eq 0 ]; then
        echo "No .delta files found in backup — this is not an incremental backup"
        exit 1
      fi

      echo "Confirmed incremental backup: found $delta_count .delta files in storage"