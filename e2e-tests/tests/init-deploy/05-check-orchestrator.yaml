apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 360
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      orc_host=$(get_orc_headless_fqdn $(get_cluster_name) 0)
      size=$(kubectl -n "${NAMESPACE}" get ps $(get_cluster_name) -o jsonpath='{.spec.mysql.size}')

      # Orchestrator can lag cluster readiness while it consolidates all members
      # under one cluster; poll until it reports every instance before snapshotting.
      for i in $(seq 1 60); do
          cluster=$(run_curl_orc "http://${orc_host}:3000/api/clusters/" | jq -r .[0] | $sed "s/.${NAMESPACE}//g")
          run_curl_orc "http://${orc_host}:3000/api/cluster/${cluster}/" | jq -r .[].Key.Hostname | $sed "s/.${NAMESPACE}//g" >"${TEMP_DIR}/instances"
          [ "$(wc -l <"${TEMP_DIR}/instances")" -eq "${size}" ] && break
          sleep 5
      done

      kubectl create configmap -n "${NAMESPACE}" 05-check-orchestrator \
          --from-literal=cluster="${cluster}" \
          --from-file=instances="${TEMP_DIR}/instances"
