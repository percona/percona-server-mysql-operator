apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 10
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      clusterName=$(get_cluster_name)
      kubectl -n "${NAMESPACE}" patch ps "${clusterName}" --type=merge -p '{"spec":{"mysql":{"clusterType":"group-replication"},"orchestrator":{"enabled":false}}}'
      sleep 5
