apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 360
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      cluster_name=$(get_cluster_name)
      router_svc=$(get_router_service "${cluster_name}")

      check_connect() {
          local user="$1"
          local pass="$2"
          kubectl -n "${NAMESPACE}" exec mysql-client -- \
              env MYSQL_PWD="${pass}" mysql -sN -h "${router_svc}" -u"${user}" -e "SELECT 1" >/dev/null 2>&1
      }

      # Capture alice's current (auto-generated) password before overwriting it,
      # so we can later confirm the old password stops working.
      alice_old_pass=$(kubectl -n "${NAMESPACE}" get secret custom-users-user-alice -o jsonpath='{.data.password}' | base64 --decode)

      # Rotate both password sources: alice's auto-generated secret and bob's
      # externally referenced secret.
      kubectl -n "${NAMESPACE}" patch secret custom-users-user-alice --type=merge -p '{"stringData":{"password":"alice-pass-2"}}'
      kubectl -n "${NAMESPACE}" patch secret custom-users-bob-pwd --type=merge -p '{"stringData":{"password":"bob-pass-2"}}'

      # Wait until the operator's ALTER USER has taken effect for both users.
      rotated=fail
      for i in $(seq 1 60); do
          set +o errexit
          check_connect alice "alice-pass-2"; a=$?
          check_connect bob "bob-pass-2"; b=$?
          set -o errexit
          if [[ ${a} -eq 0 && ${b} -eq 0 ]]; then
              rotated=success
              break
          fi
          echo "waiting for password rotation to take effect (${i})"
          sleep 5
      done

      # Once the new passwords work, the old ones must be rejected.
      old_rejected=fail
      set +o errexit
      check_connect alice "${alice_old_pass}"; a_old=$?
      check_connect bob "bob-pass-1"; b_old=$?
      set -o errexit
      if [[ ${a_old} -ne 0 && ${b_old} -ne 0 ]]; then
          old_rejected=success
      fi

      kubectl create configmap -n "${NAMESPACE}" 05-check-rotation \
          --from-literal=rotated="${rotated}" \
          --from-literal=old_rejected="${old_rejected}"
      kubectl get configmap -n "${NAMESPACE}" 05-check-rotation -o yaml
