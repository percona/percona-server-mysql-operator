apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 360
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      cluster_name=$(get_cluster_name)
      mysql_host="-h $(get_router_service "${cluster_name}")"

      # Remove bob from the spec, leaving only alice. cleanupUsers should drop
      # bob's account while leaving alice untouched.
      kubectl -n "${NAMESPACE}" patch ps "${test_name}" --type=merge -p '{
        "spec": {
          "users": [
            {
              "name": "alice",
              "dbs": ["myapp"],
              "grants": ["SELECT"]
            }
          ]
        }
      }'

      cleanup=fail
      for i in $(seq 1 60); do
          bob_count=$(run_mysql "SELECT COUNT(*) FROM mysql.user WHERE user='bob'" "${mysql_host}" 2>/dev/null || true)
          alice_count=$(run_mysql "SELECT COUNT(*) FROM mysql.user WHERE user='alice'" "${mysql_host}" 2>/dev/null || true)
          if [[ "${bob_count}" == "0" && "${alice_count}" == "1" ]]; then
              cleanup=success
              break
          fi
          echo "waiting for bob to be dropped (${i})"
          sleep 5
      done

      kubectl create configmap -n "${NAMESPACE}" 06-check-cleanup \
          --from-literal=cleanup="${cleanup}"
      kubectl get configmap -n "${NAMESPACE}" 06-check-cleanup -o yaml
