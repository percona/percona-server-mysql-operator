apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 60
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      # bob's password is provided through an external secret referenced by
      # passwordSecretRef. alice has no passwordSecretRef, so the operator
      # auto-generates her password into the "custom-users-user-alice" secret.
      kubectl -n "${NAMESPACE}" create secret generic custom-users-bob-pwd \
          --from-literal=password='bob-pass-1' \
          --dry-run=client -o yaml \
          | kubectl -n "${NAMESPACE}" apply -f -

      kubectl -n "${NAMESPACE}" patch ps "${test_name}" --type=merge -p '{
        "spec": {
          "users": [
            {
              "name": "alice",
              "dbs": ["myapp"],
              "grants": ["SELECT", "INSERT", "UPDATE"]
            },
            {
              "name": "bob",
              "grants": ["SELECT"],
              "passwordSecretRef": {
                "name": "custom-users-bob-pwd",
                "key": "password"
              }
            }
          ]
        }
      }'
