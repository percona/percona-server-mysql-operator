apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 600
collectors:
  - type: pod
    selector: "app.kubernetes.io/component=pitr"
    tail: 1000
---
apiVersion: ps.percona.com/v1
kind: PerconaServerMySQL
metadata:
  name: async-pitr-minio
  finalizers:
    - percona.com/delete-mysql-pods-in-order
status:
  mysql:
    ready: 3
    size: 3
    state: ready
  haproxy:
    ready: 3
    size: 3
    state: ready
  orchestrator:
    ready: 3
    size: 3
    state: ready
  state: ready
---
kind: PerconaServerMySQLRestore
apiVersion: ps.percona.com/v1
metadata:
  name: async-pitr-minio-restore
status:
  state: Succeeded
