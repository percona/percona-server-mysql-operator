apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 30
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      cluster_name=$(get_cluster_name)

      for i in 0 1 2; do
          max_id=$(run_mysql "SELECT MAX(id) FROM myDB.myTable" "-h ${cluster_name}-mysql-${i}.${cluster_name}-mysql")
          kubectl create configmap -n "${NAMESPACE}" 09-read-data-${i} --from-literal=max_id="${max_id}"
      done
