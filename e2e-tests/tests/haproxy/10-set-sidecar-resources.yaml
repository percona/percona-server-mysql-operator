apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 10
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      # Set sidecarResources for mysql-monit and explicit resources for haproxy
      # to verify they are applied independently.
      kubectl -n "${NAMESPACE}" patch perconaservermysql haproxy --type merge -p '{
        "spec": {
          "proxy": {
            "haproxy": {
              "resources": {
                "requests": {"cpu": "200m", "memory": "256Mi"},
                "limits":   {"cpu": "500m", "memory": "512Mi"}
              },
              "sidecarResources": {
                "mysql-monit": {
                  "requests": {"cpu": "50m",  "memory": "64Mi"},
                  "limits":   {"cpu": "100m", "memory": "128Mi"}
                }
              }
            }
          }
        }
      }'
