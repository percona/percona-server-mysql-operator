apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 420
# Verify that sidecarResources are applied only to mysql-monit and that
# the main haproxy container uses the separately configured resources.
---
kind: StatefulSet
apiVersion: apps/v1
metadata:
  name: haproxy-haproxy
spec:
  template:
    spec:
      containers:
      - name: haproxy
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      - name: mysql-monit
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
status:
  observedGeneration: 2
  replicas: 3
  readyReplicas: 3
  currentReplicas: 3
  updatedReplicas: 3
  collisionCount: 0
