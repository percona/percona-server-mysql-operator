apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - timeout: 60
    script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      backup="demand-backup-retry"
      eval "$(
        kubectl get ps-backup "$backup" -n "$NAMESPACE" -o json \
          | jq -r '
            .status.storage.type as $t |
            (if $t then .status.storage[$t] else {} end) as $s |
            "storage_type=\($t // "")",
            "bucket=\($s.bucket // $s.container // "")",
            "secret_name=\($s.credentialsSecret // "")",
            "endpoint=\($s.endpointUrl // "")",
            "region=\($s.region // "")",
            "destination=\(.status.destination // "")"
          '
      )"

      prefix="${destination#*://}"
      prefix="${prefix#*/}"
      if [[ -z "$destination" ]]; then
        echo "Backup $backup is missing destination"
        exit 1
      fi

      backup_exists=false
      for i in {1..5}; do
        count="$(count_files_on_storage "$storage_type" "$bucket" "$prefix" "$secret_name" "$region" "$endpoint")"
        if [[ $count -gt 0 ]]; then
          echo "Backup files found for: $backup"
          backup_exists=true
          break
        fi

        echo "Waiting for backup prefix to be available ($i/5): $backup"
        sleep 5
      done

      if ! $backup_exists; then
        echo "Backup isn't present in storage: $backup"
        exit 1
      fi

