apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - timeout: 60
    script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      backup="demand-backup-retry"

      read -r storage_type bucket secret_name endpoint region destination <<< "$(
        kubectl get ps-backup "$backup" -n "$NAMESPACE" -o json |
        yq -r '
          .status.storage as $storage |
          [
            $storage.type,
            ($storage[.type].bucket // $sstorage[.type].container // ""),
            ($storage[.type].credentialsSecret // ""),
            ($storage[.type].endpointUrl // ""),
            ($storage[.type].region // ""),
            (.status.destination // "")
          ] | @tsv
        '
      )"

      prefix="${destination#*://*/}"
      if [[ -z "$destination" ]]; then
        echo "Backup $backup is missing destination"
        exit 1
      fi

      backup_exists=false
      for i in {1..5}; do
        if ! check_prefix_empty_on_storage "$backup" "$storage_type" "$bucket" "$prefix" "$secret_name" "$region" "$endpoint"; then
          echo "Backup prefix exists: $backup"
          backup_exists=true
          break
        fi

        echo "Waiting for backup prefix to be available ($i/5): $backup"
        sleep 5
      done

      if ! $backup_exists; then
        echo "Backup isn't present in storage: $backup"
        exit 1
      fi

