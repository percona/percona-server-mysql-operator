apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      binlogs_prefix=$(kubectl -n "$NAMESPACE" get configmap binlogs-prefix -o jsonpath='{.data.prefix}')
      get_cr \
        | yq eval '.spec.sslSecretName="gr-pitr-one-pod"' - \
        |  yq eval '
            (.. | select(tag == "!!str")) |= sub("<prefix>"; "'"$(get_binlogs_prefix)"'")
          ' - \
        | kubectl -n "$NAMESPACE" apply -f -
