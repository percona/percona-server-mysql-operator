apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 10
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      binlogs_prefix=$(kubectl -n "$NAMESPACE" get configmap binlogs-prefix -o jsonpath='{.data.prefix}')
      get_cr "restore" \
        | yq eval '.spec.sslSecretName="gr-pitr-one-pod-restore"' - \
        |  yq eval '
            (.. | select(tag == "!!str")) |= sub("<prefix>"; "'"$binlogs_prefix"'")
          ' - \
        | kubectl -n "$NAMESPACE" apply -f -
