apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 30
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      max_id=$(run_mysql "SELECT MAX(id) FROM myDB.myTable" "-h $(get_haproxy_svc gr-pitr-one-pod-restore)")
      kubectl create configmap -n "${NAMESPACE}" 11-read-data --from-literal=max_id="${max_id}"
