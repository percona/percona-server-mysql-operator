apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - timeout: 120
    script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      backup_name="gr-pitr-one-pod-incr"
      restore_name="gr-pitr-one-pod-restore"
      cluster_name="gr-pitr-one-pod-restore"
      destination=$(kubectl -n "${NAMESPACE}" get ps-backup "${backup_name}" -o jsonpath='{.status.destination}')
      pitr_date=$(kubectl get configmap -n "${NAMESPACE}" pitr-date -o jsonpath='{.data.date}')
      pitr_binlog_server="${TEMP_DIR}/pitr-binlog-server.yaml"

      kubectl get ps "${cluster_name}" -n "${NAMESPACE}" -o yaml \
          | yq eval '.spec.backup.pitr.binlogServer' - > "${pitr_binlog_server}"

      kubectl patch ps "${cluster_name}" -n "${NAMESPACE}" --type=json -p='[{"op":"remove","path":"/spec/backup/pitr/binlogServer"}]'

      sleep 60

      run_restore "${restore_name}" "" "${cluster_name}" "pitr" "${destination}" "${pitr_date}" "${pitr_binlog_server}"
