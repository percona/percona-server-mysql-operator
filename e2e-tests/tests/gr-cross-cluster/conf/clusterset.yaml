apiVersion: ps.percona.com/v1
kind: PerconaServerMySQLClusterSet
metadata:
  name: gr-cross-cluster
  finalizers:
  - percona.com/clusterset-dissolve
spec:
  unsafeFlags:
    forcedFailover: false
    forcedClusterRemoval: false
  primaryCluster: grcrossclusterdc1
  sslMode: AUTO
  credentialsSecret:
    name: test-secrets
    key: clusterset
  clusters:
    - innodbClusterName: grcrossclusterdc1
      endpoints:
      - host: gr-cross-cluster-dc1-mysql-primary
    - innodbClusterName: grcrossclusterdc2
      endpoints:
      - host: gr-cross-cluster-dc2-mysql-0.gr-cross-cluster-dc2-mysql
  mysqlshellRunner:
    image: image