apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 420
commands:
  - script: |-
      set -o errexit
      set -o pipefail
      set -o xtrace

      source ../../functions

      mysql_user="-uroot -p'$(get_user_pass root test-secrets)'"

      status=$(get_clusterset_status "-h gr-cross-cluster-dc2-mysql-primary" "${mysql_user}")

      echo "${status}" | jq .
      echo "${status}" | jq -e '
          .status == "HEALTHY" and
          .primaryCluster == "grcrossclusterdc2" and
          .clusters.grcrossclusterdc2.clusterRole == "PRIMARY" and
          .clusters.grcrossclusterdc2.globalStatus == "OK" and
          (.clusters | length) == 1
      '
    timeout: 420
---
kind: PerconaServerMySQLClusterSet
apiVersion: ps.percona.com/v1
metadata:
  name: gr-cross-cluster
spec:
  clusters:
    - name: grcrossclusterdc2
      endpoints:
      - host: gr-cross-cluster-dc2-mysql-0.gr-cross-cluster-dc2-mysql
status:
  conditions:
  - type: Ready
    status: "True"
  - type: ClusterSetBootstrapped
    status: "True"
  - type: MySQLShellRunnerReady
    status: "True"
  clusters:
    grcrossclusterdc2:
      clusterRole: PRIMARY
      globalStatus: OK
  primaryCluster: grcrossclusterdc2