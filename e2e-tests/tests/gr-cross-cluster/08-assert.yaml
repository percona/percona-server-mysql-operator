apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 420
resourceRefs:
- kind: PerconaServerMySQL
  apiVersion: ps.percona.com/v1
  name: gr-cross-cluster-dc1
  ref: dc1
- kind: PerconaServerMySQL
  apiVersion: ps.percona.com/v1
  name: gr-cross-cluster-dc2
  ref: dc2
assertAll:
- celExpr: dc1.status.conditions.exists(c, c.type == "ClusterSetMember" && c.status == "True" && c.reason == "Replica")
  message: "dc1 should have ClusterSetMember=True with reason Replica"
- celExpr: dc2.status.conditions.exists(c, c.type == "ClusterSetMember" && c.status == "True" && c.reason == "Primary")
  message: "dc2 should have ClusterSetMember=True with reason Primary"

commands:
  - script: |-
      set -o errexit
      set -o pipefail
      set -o xtrace

      source ../../functions

      mysql_user="-uroot -p'$(get_user_pass root test-secrets)'"

      status=$(get_clusterset_status "-h gr-cross-cluster-dc1-mysql-primary" "${mysql_user}")

      echo "${status}" | jq .
      echo "${status}" | jq -e '
          .status == "HEALTHY" and
          .primaryCluster == "grcrossclusterdc2" and
          .clusters.grcrossclusterdc1.clusterRole == "REPLICA" and
          .clusters.grcrossclusterdc1.globalStatus == "OK" and
          .clusters.grcrossclusterdc2.clusterRole == "PRIMARY" and
          .clusters.grcrossclusterdc2.globalStatus == "OK"
      '
    timeout: 420
---
kind: PerconaServerMySQLClusterSet
apiVersion: ps.percona.com/v1
metadata:
  name: gr-cross-cluster
status:
  conditions:
  - type: MySQLShellRunnerReady
    status: "True"
  - type: ClusterSetBootstrapped
    status: "True"
  - type: Ready
    status: "True"
  clusters:
    grcrossclusterdc1:
      clusterRole: REPLICA
      globalStatus: OK
    grcrossclusterdc2:
      clusterRole: PRIMARY
      globalStatus: OK
  primaryCluster: grcrossclusterdc2