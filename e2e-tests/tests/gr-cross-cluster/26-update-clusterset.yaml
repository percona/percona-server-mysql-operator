apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 10
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      kubectl patch -n "${NAMESPACE}" ps-clusterset gr-cross-cluster --type=json \
        -p='[{"op": "add", "path": "/spec/clusters/-", "value": {"innodbClusterName": "grcrossclustersinglenode", "endpoints": [{"host": "gr-cross-cluster-single-node-mysql-0.gr-cross-cluster-single-node-mysql"}]}}]'
