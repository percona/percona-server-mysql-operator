apiVersion: ps.percona.com/v1
kind: PerconaServerMySQLBackup
metadata:
  name: <backup-name>
  finalizers:
    - percona.com/delete-backup
spec:
  clusterName: gr-demand-backup-incremental-compressed
  storageName: <storage-name>
  type: incremental
  containerOptions:
    args:
      xtrabackup:
        - "--compress"
