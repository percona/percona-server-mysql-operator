apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - timeout: 30
    script: |
      kubectl get ps scheduled-backup-incremental -n "${NAMESPACE}" -o json \
        | yq eval '
          (.spec.backup.storages | keys | .[0]) as $storage |
           .spec.backup.schedule = [{
            "name": "full",
            "keep": 2,
            "schedule": "",
            "storageName": $storage
          }]
        ' - \
        | kubectl apply -n "${NAMESPACE}" -f -
