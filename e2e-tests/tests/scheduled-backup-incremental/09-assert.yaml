apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 420
commands:
  - script: |-
      set -o errexit

      source ../../functions

      backup_count=$(count_backups_in_schedule "incr" "$(get_cluster_name)")
      until [[ $backup_count -eq 3 ]]; do
        echo "There are $backup_count incremental ps-backups but should be 3"
        sleep 5

        backup_count=$(count_backups_in_schedule "incr" "$(get_cluster_name)")
      done
    timeout: 420
  - script: |-
      set -o errexit

      source ../../functions

      backup_count=$(count_backups_in_schedule "full" "$(get_cluster_name)")
      until [[ $backup_count -eq 1 ]]; do
        echo "There are $backup_count full ps-backups but should be 1"
        sleep 5

        backup_count=$(count_backups_in_schedule "full" "$(get_cluster_name)")
      done
    timeout: 420
