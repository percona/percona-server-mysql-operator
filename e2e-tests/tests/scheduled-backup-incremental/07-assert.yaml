apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 600
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      bcp_count=$(count_backups_in_schedule "minio-incr" "$(get_cluster_name)")
      if [[ $bcp_count -lt 3 ]]; then
        echo "There are $bcp_count incremental ps-backups but should be at least 3"
        exit 1
      fi
    timeout: 600
---
kind: PerconaServerMySQLBackup
apiVersion: ps.percona.com/v1
metadata:
  labels:
    percona.com/backup-type: cron
    percona.com/cluster: scheduled-backup-incremental
status:
  type: incremental
  state: Succeeded