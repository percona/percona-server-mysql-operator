apiVersion: ps.percona.com/v1
kind: PerconaServerMySQL
metadata:
  name: scheduled-backup-incremental
spec:
  backup:
    schedule:
    - keep: 1
      name: minio-full
      schedule: ''
      storageName: minio
    - name: minio-incr
      schedule: '*/2 * * * *'
      storageName: minio
      type: incremental
