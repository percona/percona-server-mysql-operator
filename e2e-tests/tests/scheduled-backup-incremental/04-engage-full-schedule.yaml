apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - timeout: 30
    script: |
      kubectl get ps scheduled-backup-incremental -n "$NAMESPACE" -o json \
        | yq '
          .spec.backup.storages as $storage
          | .spec.backup.schedule = [{
              "keep": 2,
              "name": "full",
              "schedule": "*/2 * * * *",
              "storageName": ($storage | keys | .[0])
            }]
        ' \
        | kubectl apply -f -
