apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 300
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      cluster_name=$(get_cluster_name)
      primary_before=$(get_primary_from_label)

      new_primary=""
      for i in 0 1 2; do
          pod="${cluster_name}-mysql-${i}"
          if [[ "${pod}" != "${primary_before}" ]]; then
              new_primary="${pod}"
              break
          fi
      done

      if [[ -z "${new_primary}" ]]; then
          echo "Could not find a secondary pod to switchover to"
          exit 1
      fi

      new_primary_fqdn="${new_primary}.${cluster_name}-mysql.${NAMESPACE}:3306"
      echo "Switching primary from ${primary_before} to ${new_primary} (${new_primary_fqdn})"

      uri=$(get_mysqlsh_uri_for_pod "${primary_before}")
      client_pod=$(get_client_pod)
      wait_pod "${client_pod}" 1>&2

      kubectl -n "${NAMESPACE}" exec "${client_pod}" -- \
          mysqlsh --js --quiet-start=2 --uri "${uri}" -- cluster setPrimary "${new_primary_fqdn}"

      wait_cluster_consistency_gr "${cluster_name}" 3 3

      primary_after=$(get_primary_from_label)

      if [[ "${primary_before}" == "${primary_after}" ]]; then
          echo "Primary pod did not change after switchover: was ${primary_before}, still ${primary_after}"
          exit 1
      fi

      if [[ "${primary_after}" != "${new_primary}" ]]; then
          echo "Primary after switchover (${primary_after}) does not match expected (${new_primary})"
          exit 1
      fi
      echo "Primary changed from ${primary_before} to ${primary_after}"

      retry=0
      until [[ "$(kubectl -n "${NAMESPACE}" get endpoints "${cluster_name}-primary" \
          -o jsonpath='{.subsets[0].addresses[0].targetRef.name}' 2>/dev/null)" == "${primary_after}" ]]; do
          sleep 5
          retry=$((retry + 1))
          if [ $retry -ge 24 ]; then
              echo "Primary service endpoint did not update to ${primary_after} after 2 minutes"
              kubectl -n "${NAMESPACE}" get endpoints "${cluster_name}-primary" -o yaml
              exit 1
          fi
      done
      echo "Primary service endpoint correctly points to new primary after switchover: ${primary_after}"
