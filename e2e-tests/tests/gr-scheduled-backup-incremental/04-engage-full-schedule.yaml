apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - timeout: 30
    script: |
      storage_name=$(kubectl get ps gr-scheduled-backup-incremental -n ${NAMESPACE} -o yaml 
        | yq '(.spec.backup.storages // {}) | keys | .[0]')

      kubectl get ps gr-scheduled-backup-incremental -n ${NAMESPACE} -o json \
        | jq --arg storage "$storage_name" '
          .spec.backup.schedule = [{
            keep: 2,
            name: "full",
            schedule: "*/2 * * * *",
            storageName: $storage
          }]
        ' \
        | kubectl apply -f -