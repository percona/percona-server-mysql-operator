apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - timeout: 30
    script: |
      kubectl get ps gr-scheduled-backup-incremental -n ${NAMESPACE} -o json \
        | yq '
          (.spec.backup.storages | keys | .[0] ) as $storage |
           .spec.backup.schedule = [{
            "keep": 2,
            "name": "full",
            "schedule": "",
            "storageName": $storage
          }]
        ' \
        | kubectl apply -n ${NAMESPACE} -f -
