apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 600
commands:
  - script: |-
      set -o errexit

      source ../../functions

      backup_count=$(count_backups_in_schedule "incr" "$(get_cluster_name)")
      until [[ $backup_count -ge 3 ]]; do
        echo "There are $backup_count incremental ps-backups but should be at least 3"
        sleep 5

        backup_count=$(count_backups_in_schedule "incr" "$(get_cluster_name)")
      done
    timeout: 600
---
kind: PerconaServerMySQLBackup
apiVersion: ps.percona.com/v1
metadata:
  labels:
    percona.com/backup-type: cron
    percona.com/cluster: gr-scheduled-backup-incremental
status:
  type: incremental
  state: Succeeded
