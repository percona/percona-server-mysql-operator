apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 420
commands:
  - script: |-
      set -o errexit

      source ../../functions

      cluster_name=$(get_cluster_name)
      backup_count=$(count_backups_in_schedule "incr" "${cluster_name}")
      until [[ $backup_count -ge 4 ]]; do
        echo "There are $backup_count incremental ps-backups but should be at least 4"
        sleep 5

        backup_count=$(count_backups_in_schedule "incr" "${cluster_name}")
      done

      backup_name=$(kubectl get ps-backup -n "${NAMESPACE}" -o json | jq -r '
        .items
        | sort_by([.metadata.creationTimestamp, .metadata.name])
        | map(select(.status.state == "Succeeded"))
        | map(select(.spec.type == "incremental"))
        | .[-1].metadata.name // ""
      ')

      if [[ -z "${backup_name}" ]]; then
        echo "No succeeded incremental backups found"
        exit 1
      fi

      kubectl create configmap -n "${NAMESPACE}" 08-gr-scheduled-backup-incremental-backup --from-literal=backupName="${backup_name}" --dry-run=client -o yaml \
        | kubectl apply -n "${NAMESPACE}" -f -
    timeout: 420
---
kind: PerconaServerMySQLBackup
apiVersion: ps.percona.com/v1
metadata:
  labels:
    percona.com/backup-type: cron
    percona.com/cluster: gr-scheduled-backup-incremental
status:
  type: incremental
  state: Succeeded
