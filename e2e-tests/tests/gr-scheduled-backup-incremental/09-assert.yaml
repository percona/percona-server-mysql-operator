apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 420
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions
      
      bcp_count=$(count_backups_in_schedule "minio-incr" "$(get_cluster_name)")
      if [[ $bcp_count -lt 6 ]]; then
        echo "There are $bcp_count incremental ps-backups but should be at least 6"
        exit 1
      fi
---
kind: PerconaServerMySQLBackup
apiVersion: ps.percona.com/v1
metadata:
  labels:
    percona.com/backup-type: cron
    percona.com/cluster: gr-scheduled-backup-incremental
status:
  type: incremental
  state: Succeeded