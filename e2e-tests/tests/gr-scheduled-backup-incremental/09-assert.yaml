apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 420
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions
      
      incr_bcp_count=$(count_backups_in_schedule "incr" "$(get_cluster_name)")
      if [[ ! $incr_bcp_count -eq 3 ]]; then
        echo "There are $incr_bcp_count incremental ps-backups but should be 3"
        exit 1
      fi
      
      full_bcp_count=$(count_backups_in_schedule "full" "$(get_cluster_name)")
      if [[ ! $full_bcp_count -eq 1 ]]; then
        echo "There are $full_bcp_count full ps-backups but should be 1"
        exit 1
      fi
    timeout: 420