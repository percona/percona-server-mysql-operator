apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 30
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      kubectl -n "${NAMESPACE}" patch ps "$(get_cluster_name)" \
          --type merge \
          -p '{"spec": {"orchestrator": {"configuration": "{\"FailMasterPromotionOnLagMinutes\": 30, \"RecoveryPeriodBlockSeconds\": 300}"}}}'
