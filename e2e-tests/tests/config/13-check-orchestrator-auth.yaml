apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 120
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      # On every orchestrator pod the "multi" auth method must:
      #  - reject unauthenticated requests (401)
      #  - allow reads for the orchestrator user and the readonly user
      #  - allow reads for readonly but reject its write operations
      idx=0
      for pod in $(kubectl -n "${NAMESPACE}" get pods -l 'app.kubernetes.io/component=orchestrator' -o jsonpath='{.items[*].metadata.name}'); do
          code() { kubectl -n "${NAMESPACE}" exec "${pod}" -c orchestrator -- sh -c "$1"; }

          noauth_code=$(code 'curl -s -o /dev/null -w "%{http_code}" "localhost:3000/api/clusters"')
          orc_read_code=$(code 'curl -s -o /dev/null -w "%{http_code}" -u "orchestrator:$(cat /etc/orchestrator/orchestrator-users-secret/orchestrator)" "localhost:3000/api/clusters"')
          ro_read_code=$(code 'curl -s -o /dev/null -w "%{http_code}" -u "readonly:any" "localhost:3000/api/clusters"')

          # readonly must not be authorized for a write action: the API
          # answers 200 but with an ERROR body; capture the Code field.
          ro_write=$(code 'curl -s -u "readonly:any" "localhost:3000/api/begin-downtime/nonexistent/3306/test/test/1s" | jq -r .Code 2>/dev/null || echo PARSE_ERR')

          echo "${pod}: noauth=${noauth_code} orc_read=${orc_read_code} ro_read=${ro_read_code} ro_write=${ro_write}"
          kubectl -n "${NAMESPACE}" create configmap "13-check-orchestrator-auth-${idx}" \
              --from-literal=noauth_code="${noauth_code}" \
              --from-literal=orc_read_code="${orc_read_code}" \
              --from-literal=ro_read_code="${ro_read_code}" \
              --from-literal=ro_write_code="${ro_write}"
          idx=$((idx + 1))
      done
