apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 600
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      cluster=$(get_cluster_name)

      # The ConfigMap change rolls the orchestrator pods (config-hash
      # annotation); wait for the rollout to finish first.
      kubectl -n "${NAMESPACE}" rollout status sts "${cluster}-orc" --timeout=300s

      # Every orchestrator pod must run with the merged custom configuration.
      idx=0
      for pod in $(kubectl -n "${NAMESPACE}" get pods -l 'app.kubernetes.io/component=orchestrator' -o jsonpath='{.items[*].metadata.name}'); do
          kubectl -n "${NAMESPACE}" wait --for=condition=ready pod "${pod}" --timeout=120s

          lag_minutes=""
          recovery_period=""
          retry=0
          until [[ -n ${lag_minutes} && ${lag_minutes} != "null" ]] || [[ ${retry} -ge 30 ]]; do
              sleep 5
              lag_minutes=$(kubectl -n "${NAMESPACE}" exec "${pod}" -c orchestrator -- \
                  jq -r '.FailMasterPromotionOnLagMinutes' /etc/orchestrator/config/orchestrator.conf.json || true)
              recovery_period=$(kubectl -n "${NAMESPACE}" exec "${pod}" -c orchestrator -- \
                  jq -r '.RecoveryPeriodBlockSeconds' /etc/orchestrator/config/orchestrator.conf.json || true)
              retry=$((retry + 1))
          done

          echo "${pod}: FailMasterPromotionOnLagMinutes=${lag_minutes} RecoveryPeriodBlockSeconds=${recovery_period}"
          kubectl -n "${NAMESPACE}" create configmap "11-check-orchestrator-config-${idx}" \
              --from-literal=fail_master_promotion_on_lag_minutes="${lag_minutes}" \
              --from-literal=recovery_period_block_seconds="${recovery_period}"
          idx=$((idx + 1))
      done
