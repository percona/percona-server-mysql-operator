apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - timeout: 30
    script: |
      storage_name=$(kubectl get ps scheduled-backup -o yaml -n ${NAMESPACE} | yq eval '.spec.backup.storages | keys | .[1]' -)
      kubectl get ps scheduled-backup -n ${NAMESPACE} -o json \
      | jq --arg storage "$storage_name" '
        .spec.backup.schedule = [{
          keep: 3,
          name: "storage-1",
          schedule: "*/2 * * * *",
          storageName: $storage
        }]
      ' \
      | kubectl apply -f -