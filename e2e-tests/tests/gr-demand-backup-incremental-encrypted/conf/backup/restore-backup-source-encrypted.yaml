apiVersion: ps.percona.com/v1
kind: PerconaServerMySQLRestore
metadata:
  name: <restore-name>
spec:
  clusterName: gr-demand-backup-incremental-encrypted
  backupSource:
    destination: <destination>
    storage:
      encryptionKeySecret:
        name: test-encryption-key
        key: encryptionKey
      type: s3
      s3:
        bucket: operator-testing
        credentialsSecret: minio-secret
        endpointUrl: http://minio-service.<namespace>:9000
        region: us-east-1
