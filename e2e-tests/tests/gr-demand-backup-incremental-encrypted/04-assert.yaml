apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 300
resourceRefs:
- apiVersion: ps.percona.com/v1
  kind: PerconaServerMySQLBackup
  name: base-backup-encrypted
  ref: bcp
assertAll:
- celExpr: bcp.status.state == "Succeeded"
  message: "Encrypted base backup should be succeeded"

- celExpr: bcp.status.type == "full"
  message: "Encrypted base backup should be a full backup"

- celExpr: bcp.status.compressed == true
  message: "Encrypted base backup should have compressed=true in status"

- celExpr: has(bcp.status.storage.encryptionKeySecret) && bcp.status.storage.encryptionKeySecret.name == "test-encryption-key" && bcp.status.storage.encryptionKeySecret.key == "encryptionKey"
  message: "Encrypted base backup should have encryptionKeySecret in status"
