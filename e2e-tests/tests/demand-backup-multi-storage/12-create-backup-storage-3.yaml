apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |
      set -o errexit
      set -o xtrace

      source ../../functions

      # Gets third storage defined and run backup
      third_storage_name=$(kubectl get ps demand-backup-multi-storage -n ${NAMESPACE} -o yaml | yq '(.spec.backup.storages // {}) | keys | .[2]')
      run_backup demand-backup-multi-storage-3 $third_storage_name "$(get_cluster_name)"
