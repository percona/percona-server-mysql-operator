apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 120
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      cluster_name="gr-cross-cluster-backup-fresh"
      mysql_user="-uroot -p'$(get_user_pass root test-secrets)'"

      data=$(retry 10 5 run_mysql "SELECT * FROM myDB.myTable" "-h ${cluster_name}-mysql-0.${cluster_name}-mysql" "${mysql_user}")
      kubectl create configmap -n "${NAMESPACE}" 20-read-data-fresh-0 --from-literal=data="${data}"
