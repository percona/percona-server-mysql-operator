apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |
      set -o errexit
      set -o xtrace

      source ../../functions

      storage_name=$(kubectl get ps gr-cross-cluster-backup-dc1 -n "${NAMESPACE}" -o yaml | yq '(.spec.backup.storages // {}) | keys | .[0]')
      run_backup dc1-backup "${storage_name}" gr-cross-cluster-backup-dc1
