apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 10
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      get_cr "dc1" \
          | yq eval '.spec.mysql.clusterType="group-replication"' - \
          | yq eval '.spec.proxy.router.enabled=false' - \
          | yq eval '.spec.unsafeFlags.proxySize=true' - \
          | yq eval '.spec.proxy.haproxy.enabled=true' - \
          | yq eval '.spec.proxy.haproxy.size=1' - \
          | yq eval '.spec.secretsName="test-secrets"' - \
          | kubectl -n "${NAMESPACE}" apply -f -

      get_cr "dc2" \
          | yq eval '.spec.mysql.clusterType="group-replication"' - \
          | yq eval '.spec.proxy.router.enabled=false' - \
          | yq eval '.spec.proxy.haproxy.enabled=true' - \
          | yq eval '.spec.mysql.bootstrap.mode="manual"' - \
          | yq eval '.spec.unsafeFlags.proxySize=true' - \
          | yq eval '.spec.proxy.haproxy.size=1' - \
          | yq eval '.spec.secretsName="test-secrets"' - \
          | kubectl -n "${NAMESPACE}" apply -f -