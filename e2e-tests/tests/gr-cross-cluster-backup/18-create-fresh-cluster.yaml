apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 10
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      get_cr "fresh" \
          | yq eval '.spec.mysql.clusterType="group-replication"' - \
          | yq eval '.spec.mysql.size=3' - \
          | yq eval '.spec.proxy.router.enabled=false' - \
          | yq eval '.spec.proxy.haproxy.enabled=false' - \
          | yq eval '.spec.unsafeFlags.proxy=true' - \
          | yq eval '.spec.secretsName="test-secrets"' - \
          | kubectl -n "${NAMESPACE}" apply -f -
