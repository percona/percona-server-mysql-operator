apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 10
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      for key in mysql-annotation haproxy-annotation; do
        if kubectl get deployment,statefulset -o yaml -n "${NAMESPACE}" | grep -q "${key}:"; then
          echo "'${key}' still exists! Failing..."
          exit 1
        fi
      done