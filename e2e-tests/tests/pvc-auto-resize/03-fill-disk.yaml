apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - timeout: 120
    script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      cluster=$(get_cluster_name)
      pod="${cluster}-mysql-0"

      # Fill the disk to ~65% of the 2Gi volume to cross the 55% autoscaling threshold
      kubectl -n "${NAMESPACE}" exec "${pod}" -c mysql -- \
          bash -c "dd if=/dev/zero of=/var/lib/mysql/fillfile bs=1M count=1300 2>/dev/null || true"

      usage=$(kubectl -n "${NAMESPACE}" exec "${pod}" -c mysql -- \
          bash -c "df /var/lib/mysql | tail -1 | awk '{print \$5}' | sed 's/%//'")
      echo "Current disk usage on ${pod}: ${usage}%"
