apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |
      set -o errexit
      set -o xtrace

      source ../../functions

      # Gets first storage defined and run backup
      cluster_name=$(get_cluster_name)
      storage_name=$(kubectl get ps $cluster_name -n ${NAMESPACE} -o yaml | yq '(.spec.backup.storages // {}) | keys | .[0]')
      run_backup gr-demand-backup-fail $storage_name $cluster_name "failure"
