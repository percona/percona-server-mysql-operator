apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 10
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      platform="$(detect_k8s_platform)"

      cr="$(get_cr \
          | yq eval '.spec.mysql.clusterType="group-replication"' - \
          | yq eval '.spec.mysql.size=3' - \
          | yq eval '.spec.proxy.router.enabled=false' - \
          | yq eval '.spec.proxy.haproxy.enabled=true' - \
          | yq eval '.spec.enableVolumeExpansion=true' - \
          | yq eval '.spec.mysql.volumeSpec.persistentVolumeClaim.resources.requests.storage="2Gi"' -)"

      if [[ "$platform" == "eks" ]]; then
        kubectl apply -f ../../conf/eks-storage-class.yaml
      fi

      printf '%s\n' "$cr" | kubectl -n "${NAMESPACE}" apply -f -
