apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - timeout: 300 # 5 minutes for resize to complete
    script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      echo "Waiting for PVC resize to complete..."

      cluster_name="$(get_cluster_name)"
      selector="app.kubernetes.io/component=database,app.kubernetes.io/instance=${cluster_name}"
      expected_pvc_count=3

      for i in {1..60}; do
          echo "Check attempt $i/60"

          pvcs="$(kubectl get pvc -n "${NAMESPACE}" -l "${selector}" --no-headers -o custom-columns=:metadata.name | grep '^datadir-' || true)"
          pvc_count="$(printf '%s\n' "$pvcs" | grep -c '^datadir-' || true)"
          if [[ "$pvc_count" -lt "$expected_pvc_count" ]]; then
              echo "Waiting for datadir PVCs: found ${pvc_count}/${expected_pvc_count}"
              sleep 5
              continue
          fi

          all_resized=true
          for pvc in $pvcs; do
              size=$(kubectl get pvc -n "${NAMESPACE}" "$pvc" -o jsonpath='{.status.capacity.storage}')
              echo "PVC $pvc size: $size"
              if [[ $size != "3Gi" ]]; then
                  all_resized=false
              fi
          done

          if [[ $all_resized == true ]]; then
              echo "All PVCs report the resized capacity"
              break
          fi

          sleep 5
      done

      echo "Final PVC sizes:"
      kubectl get pvc -n "${NAMESPACE}" \
          -l "${selector}" \
          -o custom-columns=NAME:.metadata.name,SIZE:.status.capacity.storage

      pvcs="$(kubectl get pvc -n "${NAMESPACE}" -l "${selector}" --no-headers -o custom-columns=:metadata.name | grep '^datadir-' || true)"
      pvc_count="$(printf '%s\n' "$pvcs" | grep -c '^datadir-' || true)"
      if [[ "$pvc_count" -ne "$expected_pvc_count" ]]; then
          echo "ERROR: Expected ${expected_pvc_count} datadir PVCs, found ${pvc_count}"
          exit 1
      fi

      for pvc in $pvcs; do
          size=$(kubectl get pvc -n "${NAMESPACE}" "$pvc" -o jsonpath='{.status.capacity.storage}')
          echo "PVC $pvc size: $size"
          if [[ $size != "3Gi" ]]; then
              echo "ERROR: PVC $pvc size is $size, expected 3Gi"
              exit 1
          fi
      done

      echo "All PVCs successfully resized to 3Gi"
